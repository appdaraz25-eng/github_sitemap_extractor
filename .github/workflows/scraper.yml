name: News Scraper

on:
  schedule:
    - cron: '27 16 * * *'   # 4:27 PM UTC = 10:27 PM UTC+6
  workflow_dispatch:          # lets you trigger manually too

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # safety limit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests aiohttp beautifulsoup4 python-dateutil lxml

      - name: Run scraper
        run: python scraper.py

      - name: Upload DB output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-output-${{ github.run_id }}
          path: |
            output/*.db
            logs/
          retention-days: 30
