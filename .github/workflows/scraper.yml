name: News Scraper

on:
  schedule:
    - cron: '43 16 * * *'
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED (fixes 403)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # ensure token is used

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests aiohttp beautifulsoup4 python-dateutil lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output/*.db logs/ || true

          git diff --cached --quiet || git commit -m "Update scraped data"

      - name: Push changes
        run: |
          git push
